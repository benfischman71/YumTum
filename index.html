    .search-inp { background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px; padding: 11px 14px; font-size: 15px; color: var(--text); width: 100%; outline: none; -webkit-appearance: none; }
    .search-inp:focus { border-color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .greet { font-size: 13px; color: var(--text3); }
    .signout-btn { font-size: 12px; color: var(--text3); padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border); }
    .count-badge { background: var(--accent); color: #fff; font-size: 10px; border-radius: 10px; padding: 1px 6px; margin-left: 4px; vertical-align: middle; }
    .find-controls { padding: 14px 20px 6px; display: flex; flex-direction: column; gap: 12px; }
    .find-query-wrap { position: relative; }
    .find-query { padding-right: 100px !important; }
    .date-btn-inline {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: var(--bg4); border: 1px solid var(--border2); border-radius: 8px;
      padding: 7px 12px; font-size: 13px; color: var(--text2); white-space: nowrap;

      background: var(--accent); color: #fff; border-radius: 10px;

    .price-sym { letter-spacing: 0; }
    .place-google-rating { color: #f5a623; font-size: 12px; }
  </style>
</head>

<script type="text/babel">

function sbAuth(path, body) {
  return fetch(SUPABASE_URL + "/auth/v1/" + path, {
    method: "POST",
    headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON_KEY },
    body: JSON.stringify(body)
  }).then(function(r) { return r.json(); });
}

function sbGet(path, token) {
  return fetch(SUPABASE_URL + "/rest/v1/" + path, {
    headers: {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": "Bearer " + (token || SUPABASE_ANON_KEY)
    }
  }).then(function(r) { return r.json(); });
}

function sbPost(path, body, token) {
  return fetch(SUPABASE_URL + "/rest/v1/" + path, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": "Bearer " + (token || SUPABASE_ANON_KEY),
      "Prefer": "return=representation"
    },
    body: JSON.stringify(body)
  }).then(function(r) { return r.json(); });
}

function sbPatch(path, body, token) {
  return fetch(SUPABASE_URL + "/rest/v1/" + path, {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_ANON_KEY,

      "Prefer": "return=representation"
    },
    body: JSON.stringify(body)
  }).then(function(r) { return r.json(); });
}

function sbDelete(path, token) {
  return fetch(SUPABASE_URL + "/rest/v1/" + path, {
    method: "DELETE",
    headers: {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": "Bearer " + (token || SUPABASE_ANON_KEY)
    }
  });
}

function priceLvl(pl) {
  if (pl === "PRICE_LEVEL_INEXPENSIVE") return { num: 1, sym: "$" };
  if (pl === "PRICE_LEVEL_MODERATE") return { num: 2, sym: "$$" };
  if (pl === "PRICE_LEVEL_EXPENSIVE") return { num: 3, sym: "$$$" };
  if (pl === "PRICE_LEVEL_VERY_EXPENSIVE") return { num: 4, sym: "$$$$" };
  return { num: 0, sym: "" };
}

function photoUrl(name) {
  if (!name) return null;
  return "https://places.googleapis.com/v1/" + name + "/media?maxWidthPx=600&key=" + GOOGLE_KEY;
}

function cuisineFromTypes(types) {
  if (!types) return "";
  var map = {
    "italian_restaurant": "Italian", "chinese_restaurant": "Chinese",
    "japanese_restaurant": "Japanese", "mexican_restaurant": "Mexican",
    "french_restaurant": "French", "indian_restaurant": "Indian",
    "thai_restaurant": "Thai", "mediterranean_restaurant": "Mediterranean",
    "american_restaurant": "American", "seafood_restaurant": "Seafood",
    "pizza_restaurant": "Pizza", "sushi_restaurant": "Sushi",
    "steakhouse": "Steakhouse", "burger_restaurant": "Burgers",
    "breakfast_restaurant": "Breakfast", "cafe": "Cafe",
    "bar": "Bar", "bakery": "Bakery",
    "korean_restaurant": "Korean", "vietnamese_restaurant": "Vietnamese",
    "greek_restaurant": "Greek", "spanish_restaurant": "Spanish",
    "middle_eastern_restaurant": "Middle Eastern", "ethiopian_restaurant": "Ethiopian",
    "food": "Restaurant", "restaurant": "Restaurant"
  };
  for (var i = 0; i < types.length; i++) {
    if (map[types[i]]) return map[types[i]];
  }
  return "Restaurant";
}

function cityFromAddress(address) {
  if (!address) return "";
  var parts = address.split(",");
  if (parts.length >= 2) return parts[parts.length - 3] ? parts[parts.length - 3].trim() : parts[parts.length - 2].trim();
  return address;
}

function ratingLabel(r) {
  if (r === "love") return "Love it";
  if (r === "like") return "Like it";
  if (r === "pass") return "Pass";
  return r || "";
}

function freqLabel(f) {
  if (f === "regular") return "Regular spot";
  if (f === "few-times") return "Few times a year";
  if (f === "special") return "Special occasions";
  if (f === "once") return "Probably once";
  return f || "";
}

function starsStr(n) {
  if (!n) return "";
  var s = "";
  var full = Math.round(n);
  for (var i = 0; i < full; i++) s += "★";
  for (var j = full; j < 5; j++) s += "☆";
  return s;
}

function debounce(fn, ms) {
  var t;
  return function() {
    var args = arguments;
    var ctx = this;
    clearTimeout(t);
    t = setTimeout(function() { fn.apply(ctx, args); }, ms);
  };
}

// Google Places Autocomplete
function placesAutocomplete(input) {
  return fetch("https://places.googleapis.com/v1/places:autocomplete", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-Goog-Api-Key": GOOGLE_KEY
    },
    body: JSON.stringify({ input: input })
  }).then(function(r) { return r.json(); });
}

// Google Place Details (New API)
function placeDetails(placeId) {
  var fields = "id,displayName,formattedAddress,location,rating,priceLevel,photos,types,primaryTypeDisplayName";
  return fetch("https://places.googleapis.com/v1/places/" + placeId + "?fields=" + fields, {
    headers: { "X-Goog-Api-Key": GOOGLE_KEY }
  }).then(function(r) { return r.json(); });
}

function nearbySearch(lat, lng, radius) {

    method: "POST",
    headers: {

// Claude recommendation
function claudeFind(userHistory, nearby, query, dateContext) {
  var histStr = userHistory.length === 0 ? "No history yet."
    : userHistory.map(function(r) {
        return r.name + ": " + ratingLabel(r.rating) + (r.cuisine ? " (" + r.cuisine + ")" : "");
      }).join("; ");

  var nearbyStr = nearby.map(function(p, i) {
    var pr = priceLvl(p.priceLevel);
    var ct = p.primaryTypeDisplayName ? p.primaryTypeDisplayName.text : cuisineFromTypes(p.types);
    return i + ". " + p.displayName.text + " | " + ct + " | " + pr.sym + " | Google " + (p.rating || "?") + "/5 | " + (p.formattedAddress || "");
  }).join("\n");

  var contextLine = dateContext
    ? "Context: This is for a date night. Date type: " + dateContext + ". Prioritize atmosphere, romance, and experience."
    : "Context: " + (query || "General recommendation.");

  var prompt = "You are a personalized restaurant recommendation assistant.\n\n"
    + "User's restaurant history: " + histStr + "\n\n"
    + "Nearby restaurants:\n" + nearbyStr + "\n\n"
    + contextLine + "\n"
    + (query && dateContext ? "User's additional request: " + query + "\n" : "")
    + "\nRecommend the best 3 from the nearby list based on the user's preferences and request. "
    + "Return ONLY a JSON array, no other text: [{\"index\":0,\"name\":\"name\",\"reason\":\"1-2 sentence reason why this fits\"}]";

  return fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": CLAUDE_KEY,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 600,
      messages: [{ role: "user", content: prompt }]
    })
  }).then(function(r) { return r.json(); });
}

          if (price !== "any") {
            var pr = priceLvl(p.priceLevel);
            if (pr.sym !== price) return false;
          }
          return true;
        });
        setResults(filtered);
        if ((query || dateCtx) && !needsCKey && filtered.length > 0) {
          setStatus("Getting AI recommendations...");
          claudeFind(restaurants, filtered, query, dateCtx).then(function(cd) {
            setLoading(false); setStatus("");
            if (cd.content && cd.content[0]) {
              try {
                var txt = cd.content[0].text;
                var start = txt.indexOf("[");
                var end = txt.lastIndexOf("]") + 1;
                var clean = (start >= 0 && end > start) ? txt.slice(start, end) : txt.trim();
                var picks = JSON.parse(clean);
                setAiPicks(picks);
              } catch(e) { setAiPicks(null); }
            }
          }).catch(function() { setLoading(false); setStatus(""); });
        } else {
          setLoading(false); setStatus("");
        }
      }).catch(function() { setLoading(false); setStatus(""); setErr("Couldn't fetch restaurants."); });
    }, function() {
      setLoading(false); setStatus("");
      setErr("Location access denied. Please allow location in Settings.");
    }, { timeout: 10000 });
  }

  var cuisineOpts = [
    { val: "any", label: "Any Cuisine" },
    { val: "italian", label: "Italian" },
    { val: "japanese", label: "Japanese" },
    { val: "mexican", label: "Mexican" },
    { val: "chinese", label: "Chinese" },
    { val: "american", label: "American" },
    { val: "thai", label: "Thai" },
    { val: "indian", label: "Indian" },
    { val: "mediterranean", label: "Mediterranean" },
    { val: "seafood", label: "Seafood" }
  ];
  var priceOpts = [
    { val: "any", label: "Any Price" },
    { val: "$", label: "$" },
    { val: "$$", label: "$$" },
    { val: "$$$", label: "$$$" },
    { val: "$$$$", label: "$$$$" }
  ];
  var distOpts = [
    { val: 800, label: "0.5 mi" },
    { val: 1600, label: "1 mi" },
    { val: 4000, label: "2.5 mi" },
    { val: 8000, label: "5 mi" }
  ];

  // Build display results with AI picks at top
  var displayResults = results;
  var aiTop = [];
  if (aiPicks && aiPicks.length > 0) {
    aiPicks.forEach(function(pick) {
      var r = results[pick.index];
      if (r) aiTop.push({ place: r, reason: pick.reason });
    });
  }

  return E("div", null,
    showDate && E(DateModal, {
      onClose: function() { setShowDate(false); },
      onSelect: function(ctx) { setDateCtx(ctx); setShowDate(false); }
    }),
    E("div", { className: "page-header" },
      E("div", { style: { display: "flex", alignItems: "baseline", justifyContent: "space-between" } },
        E("div", { className: "page-title" }, "Find a Spot"),
        dateCtx && E("button", {
          style: { fontSize: 12, color: "var(--love)", borderRadius: 20, border: "1px solid rgba(224,96,122,0.3)", padding: "4px 12px", background: "rgba(224,96,122,0.08)" },
          onClick: function() { setDateCtx(null); }
        }, "🌹 Date mode ✕")
      )
    ),
    E("div", { className: "tab-content" },
      (needsGKey || needsCKey) && E("div", { className: "setup-warn" },
        needsGKey ? "⚠️ Add your Google Places API key (GOOGLE_KEY) to use Find a Spot." : "ℹ️ Add your Claude API key (CLAUDE_KEY) for AI-powered recommendations."
      ),
      E("div", { className: "find-controls" },
        E("div", { className: "find-query-wrap" },
          E("input", {
            type: "text", className: "find-query",
            placeholder: dateCtx ? "Any specific vibe or preferences?" : "What are you in the mood for?",
            value: query, onChange: function(e) { setQuery(e.target.value); },
            style: { fontSize: 16, paddingRight: 110 }
          }),
          E("button", { className: "date-btn-inline", onClick: function() { setShowDate(true); } }, "🌹 Date")
        ),
        dateCtx && E("div", {
          style: { fontSize: 12, color: "var(--love)", lineHeight: 1.4, padding: "2px 4px", fontStyle: "italic" }
        }, dateCtx.split(":")[0])
      ),
      E("div", { className: "chip-row" },
        cuisineOpts.map(function(o) {
          return E("button", { key: o.val, className: "chip" + (cuisine === o.val ? " active" : ""), onClick: function() { setCuisine(o.val); } }, o.label);
        })
      ),
      E("div", { className: "chip-row" },
        priceOpts.map(function(o) {
          return E("button", { key: o.val, className: "chip" + (price === o.val ? " active" : ""), onClick: function() { setPrice(o.val); } }, o.label);
        })
      ),
      E("div", { className: "chip-row" },
        distOpts.map(function(o) {
          return E("button", { key: o.val, className: "chip" + (radius === o.val ? " active" : ""), onClick: function() { setRadius(o.val); } }, o.label);
        })
      ),
      E("div", { style: { padding: "4px 20px 12px" } },
        E("button", { className: "find-go-btn", onClick: handleFind, disabled: loading },
          loading ? (status || "Finding...") : "📍 Find Restaurants Near Me"
        )
      ),
      loading && E("div", { style: { textAlign: "center", padding: 30 } },
        E("div", { className: "spinner", style: { margin: "0 auto 12px" } }),
        E("div", { style: { fontSize: 13, color: "var(--text3)" } }, status)
      ),
      err && E("div", { style: { margin: "0 20px", padding: "12px 14px", background: "rgba(201,71,42,0.1)", borderRadius: 10, fontSize: 13, color: "var(--accent2)" } }, err),

      // AI picks at top
      aiTop.length > 0 && E("div", { style: { padding: "0 16px 8px" } },
        E("div", { style: { display: "flex", alignItems: "center", gap: 10, margin: "8px 0 12px" } },
          E("div", { className: "ai-pill" }, "✦ Claude Picks"),
          E("div", { style: { fontSize: 12, color: "var(--text3)" } }, "Based on your taste")
        ),
        aiTop.map(function(item) {
          return E(FindCard, { key: item.place.id, place: item.place, reason: item.reason });
        })
      ),

      // Rest of results
      !loading && results.length > 0 && E("div", { style: { padding: "0 16px 8px" } },
        aiTop.length > 0 && E("div", { style: { marginTop: 16, marginBottom: 12 } },
          E("div", { style: { height: 1, background: "var(--border)", marginBottom: 14 } }),
          E("div", { style: { fontSize: 11, color: "var(--text3)", textTransform: "uppercase", letterSpacing: "0.12em" } }, "All nearby restaurants")
        ),
        results.map(function(p) {
          return E(FindCard, { key: p.id, place: p });
        })
      ),

      !loading && results.length === 0 && displayResults.length === 0 && !err && E("div", { className: "empty-state" },
        E("div", { className: "empty-icon" }, "📍"),
        E("div", { className: "empty-title" }, "Find your next spot"),
        E("div", { className: "empty-text" }, "Use filters and tap Find to discover restaurants near you")
      )
    )
  );
}

function FindCard(props) {
  var p = props.place;
  var reason = props.reason;
  var pr = priceLvl(p.priceLevel);
  var ph = p.photos && p.photos.length > 0 ? photoUrl(p.photos[0].name) : null;
  var cu = p.primaryTypeDisplayName ? p.primaryTypeDisplayName.text : cuisineFromTypes(p.types);
  return E("div", { className: "find-card" },
    ph && E("img", { src: ph, className: "find-card-img", alt: p.displayName.text, onError: function(e) { e.target.style.display = "none"; } }),
    E("div", { className: "find-card-body" },
      E("div", { className: "find-card-name" }, p.displayName.text),
      E("div", { className: "find-card-meta" },
        [cu, pr.sym, p.rating ? ("★ " + p.rating + " Google") : null].filter(Boolean).join("  ·  ")
      ),
      p.formattedAddress && E("div", { style: { fontSize: 12, color: "var(--text3)", marginTop: 4 } }, p.formattedAddress),
      reason && E("div", { className: "ai-reason" }, "\u201C" + reason + "\u201D")
    )
  );
}

// ======================================================
// EDIT MODAL
// ======================================================
function EditModal(props) {
  var existing = props.existing;
  var onSave = props.onSave;
  var onClose = props.onClose;
  return E("div", { className: "modal-overlay",
    onMouseDown: function(e) { if (e.target === e.currentTarget) onClose(); },
    onTouchEnd: function(e) { if (e.target === e.currentTarget) onClose(); }
  },
    E("div", { className: "modal-sheet" },
      E("div", { className: "modal-handle" }),
      E("div", { className: "modal-title" }, "Edit " + existing.name),
      E(AddRestaurantForm, {
        existing: existing,
        onSave: onSave,
        onCancel: onClose
      })
    )
  );
}

// ======================================================
// MAIN APP
// ======================================================
function MainApp(props) {
  var token = props.token;
  var user = props.user;
  var onLogout = props.onLogout;

  var _tab = useState("spots"); var tab = _tab[0]; var setTab = _tab[1];
  var _rests = useState([]); var restaurants = _rests[0]; var setRestaurants = _rests[1];
  var _editing = useState(null); var editing = _editing[0]; var setEditing = _editing[1];
  var _loaded = useState(false); var loaded = _loaded[0]; var setLoaded = _loaded[1];

  var firstName = user && user.user_metadata ? user.user_metadata.first_name : "";

  useEffect(function() {
    sbGet("restaurants?select=*&order=created_at.desc", token).then(function(data) {
      if (Array.isArray(data)) setRestaurants(data);
      setLoaded(true);
    }).catch(function() { setLoaded(true); });
  }, [token]);

  function handleSave(rec, existingId, setSaving) {
    rec.user_id = user.id;
    if (existingId) {
      // Update
      sbPatch("restaurants?id=eq." + existingId, rec, token).then(function(data) {
        setSaving(false);
        if (Array.isArray(data) && data.length > 0) {
          setRestaurants(function(prev) { return prev.map(function(r) { return r.id === existingId ? data[0] : r; }); });
          setEditing(null);
        }
      }).catch(function() { setSaving(false); });
    } else {
      // Check if same google_place_id already exists for this user
      var gpid = rec.google_place_id;
      var existing_r = gpid ? restaurants.find(function(r) { return r.google_place_id === gpid; }) : null;
      if (existing_r) {
        sbPatch("restaurants?id=eq." + existing_r.id, rec, token).then(function(data) {
          setSaving(false);
          if (Array.isArray(data) && data.length > 0) {
            setRestaurants(function(prev) { return prev.map(function(r) { return r.id === existing_r.id ? data[0] : r; }); });
            setTab("spots");
          }
        }).catch(function() { setSaving(false); });
      } else {
        sbPost("restaurants", rec, token).then(function(data) {
          setSaving(false);
          if (Array.isArray(data) && data.length > 0) {
            setRestaurants(function(prev) { return [data[0]].concat(prev); });
            setTab("spots");
          } else if (data && data.id) {
            setRestaurants(function(prev) { return [data].concat(prev); });
            setTab("spots");
          }
        }).catch(function() { setSaving(false); });
      }
    }
  }

  function handleDelete(id) {
    if (!window.confirm("Remove this restaurant?")) return;
    sbDelete("restaurants?id=eq." + id, token).then(function() {
      setRestaurants(function(prev) { return prev.filter(function(r) { return r.id !== id; }); });
    });
  }

  var tabContent;
  if (tab === "spots") {
    tabContent = E(SpotsTab, { restaurants: restaurants, onEdit: function(r) { setEditing(r); }, onDelete: handleDelete });
  } else if (tab === "rate") {
    tabContent = E(RateTab, { onSave: handleSave, onSwitchTab: setTab });
  } else if (tab === "find") {
    tabContent = E(FindTab, { restaurants: restaurants });
  }

  return E("div", { className: "screen" },
    tabContent,

    editing && E(EditModal, {
      existing: editing,
      onSave: handleSave,
      onClose: function() { setEditing(null); }
    }),

    E("div", { className: "bottom-nav" },
      [
        { key: "spots", icon: "🗂", label: "My Spots" },
        { key: "rate", icon: "⭐", label: "Rate" },
        { key: "find", icon: "🔍", label: "Find" }
      ].map(function(t) {
        return E("button", { key: t.key, className: "nav-btn" + (tab === t.key ? " active" : ""), onClick: function() { setTab(t.key); } },
          E("span", { className: "nav-icon" }, t.icon),
          E("span", null, t.label)
        );
      }),
      E("button", { className: "nav-btn", onClick: onLogout, style: { maxWidth: 60 } },
        E("span", { className: "nav-icon" }, "👤"),
        E("span", null, firstName || "Out")
      )
    )
  );
}

// ======================================================
// APP ROOT
// ======================================================
function App() {
  var _token = useState(null); var token = _token[0]; var setToken = _token[1];
  var _user = useState(null); var user = _user[0]; var setUser = _user[1];

  function handleLogin(t, u) { setToken(t); setUser(u); }
  function handleLogout() { setToken(null); setUser(null); }

  if (!token) {
    return E(LoginScreen, { onLogin: handleLogin });
  }
  return E(MainApp, { token: token, user: user, onLogout: handleLogout });
}

ReactDOM.render(E(App), document.getElementById("root"));
</script>
</body>
</html>
