<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>FindASpot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0d0b09;
      --bg2: #181412;
      --bg3: #221e1a;
      --bg4: #2a2420;
      --accent: #c9472a;
      --accent2: #e05a38;
      --accent-dim: rgba(201,71,42,0.15);
      --accent-dim2: rgba(201,71,42,0.08);
      --love: #e0607a;
      --like: #5aab72;
      --pass: #7a8998;
      --text: #f0ebe3;
      --text2: #9b8f83;
      --text3: #5a5147;
      --border: #242019;
      --border2: #332e29;
      --card: #181412;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }
    html, body { height: 100%; background: var(--bg); }
    body { font-family: 'IBM Plex Sans', sans-serif; color: var(--text); min-height: 100vh; overflow-x: hidden; }
    #root { min-height: 100vh; }
    input, textarea, button, select { font-family: 'IBM Plex Sans', sans-serif; }
    button { cursor: pointer; border: none; background: none; }
    input, textarea {
      background: var(--bg3); border: 1px solid var(--border2);
      color: var(--text); border-radius: 10px; padding: 13px 15px;
      font-size: 16px; width: 100%; outline: none; -webkit-appearance: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: none; }
    ::placeholder { color: var(--text3); }
    .serif { font-family: 'Cormorant Garamond', serif; }
    .tab-content { flex: 1; overflow-y: auto; padding-bottom: calc(80px + var(--safe-b)); }
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg2); border-top: 1px solid var(--border);
      display: flex; padding-bottom: var(--safe-b); z-index: 100;
    }
    .nav-btn {
      flex: 1; padding: 12px 4px 10px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      color: var(--text3); font-size: 10px; text-transform: uppercase; letter-spacing: 0.09em;
      transition: color 0.2s; position: relative;
    }
    .nav-btn.active { color: var(--accent2); }
    .nav-icon { font-size: 22px; line-height: 1; transition: transform 0.2s; }
    .nav-btn.active .nav-icon { transform: scale(1.08); }
    .page-header {
      padding-top: calc(16px + var(--safe-t)); padding-bottom: 14px;
      padding-left: 20px; padding-right: 20px;
      background: var(--bg); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
    }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 300; }
    .page-sub { font-size: 11px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.12em; }
    /* GLOBAL NAV */
    .global-nav {
      position: sticky; top: 0; z-index: 50;
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding-top: calc(10px + var(--safe-t));
    }
    .global-nav-row1 {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px 10px;
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300;
      letter-spacing: -0.01em; color: var(--text3);
    }
    .nav-logo span { color: var(--accent2); }
    .nav-icons { display: flex; align-items: center; gap: 4px; }
    .nav-icon-btn {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 6px 8px; border-radius: 8px; font-size: 9px; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.08em; transition: all 0.15s;
    }
    .nav-icon-btn:active { background: var(--bg3); }
    .nav-icon-btn.active { color: var(--accent2); }
    .nav-icon-btn .ni { font-size: 18px; line-height: 1; }
    .nav-date-row {
      padding: 0 16px 12px;
    }
    .nav-date-btn {
      width: 100%; padding: 11px 18px;
      background: linear-gradient(135deg, rgba(224,96,122,0.18) 0%, rgba(180,50,80,0.14) 100%);
      border: 1.5px solid rgba(224,96,122,0.4); border-radius: 50px;
      display: flex; align-items: center; gap: 10px;
      transition: all 0.18s; cursor: pointer;
    }
    .nav-date-btn:active { opacity: 0.85; transform: scale(0.98); }
    .nav-date-btn.active { background: linear-gradient(135deg, rgba(224,96,122,0.3) 0%, rgba(180,50,80,0.24) 100%); border-color: var(--love); }
    .nav-date-icon { font-size: 20px; line-height: 1; }
    .nav-date-label { flex: 1; text-align: left; }
    .nav-date-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--love); font-weight: 400; line-height: 1; }
    .nav-date-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .nav-date-arrow { font-size: 16px; color: var(--love); opacity: 0.5; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .btn-primary {
      background: var(--accent); color: #fff; border-radius: 11px;
      padding: 15px 24px; font-size: 15px; font-weight: 500; width: 100%;
      transition: background 0.2s, transform 0.1s; letter-spacing: 0.02em;
    }
    .btn-primary:active { background: var(--accent2); transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.4; }
    .btn-ghost {
      border: 1px solid var(--border2); color: var(--text2); border-radius: 11px;
      padding: 13px 24px; font-size: 14px; width: 100%; transition: border-color 0.2s;
    }
    .btn-ghost:active { border-color: var(--accent); color: var(--accent2); }
    .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
    .badge-love { background: rgba(224,96,122,0.15); color: var(--love); }
    .badge-like { background: rgba(90,171,114,0.15); color: var(--like); }
    .badge-pass { background: rgba(122,137,152,0.15); color: var(--pass); }
    .chip {
      padding: 7px 15px; border-radius: 20px; font-size: 13px;
      border: 1px solid var(--border2); color: var(--text2); white-space: nowrap;
      transition: all 0.15s; flex-shrink: 0;
    }
    .chip.active { border-color: var(--accent); color: var(--accent2); background: var(--accent-dim2); }
    .chip-row { display: flex; gap: 8px; overflow-x: auto; padding: 12px 20px; -ms-overflow-style: none; scrollbar-width: none; }
    .chip-row::-webkit-scrollbar { display: none; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      z-index: 200; display: flex; align-items: flex-end;
    }
    .modal-sheet {
      background: var(--bg2); border-radius: 20px 20px 0 0;
      width: 100%; padding: 20px 20px calc(24px + var(--safe-b));
      max-height: 90vh; overflow-y: auto;
    }
    .modal-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border2); margin: 0 auto 20px; }
    .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 400; margin-bottom: 18px; }
    .divider { height: 1px; background: var(--border); margin: 16px 0; }
    .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text3); margin-bottom: 10px; }
    .rating-btn {
      flex: 1; padding: 15px 8px; border-radius: 12px;
      border: 2px solid var(--border2); display: flex; flex-direction: column;
      align-items: center; gap: 5px; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text3); transition: all 0.15s;
    }
    .rating-emoji { font-size: 26px; line-height: 1; }
    .rating-btn.love.sel { border-color: var(--love); background: rgba(224,96,122,0.1); color: var(--love); }
    .rating-btn.like.sel { border-color: var(--like); background: rgba(90,171,114,0.1); color: var(--like); }
    .rating-btn.pass.sel { border-color: var(--pass); background: rgba(122,137,152,0.1); color: var(--pass); }
    .freq-btn {
      padding: 11px 15px; border-radius: 10px; border: 1px solid var(--border2);
      font-size: 13px; color: var(--text2); transition: all 0.15s; text-align: left; width: 100%;
    }
    .freq-btn.sel { border-color: var(--accent); color: var(--accent2); background: var(--accent-dim2); }
    .place-preview { border-radius: 12px; overflow: hidden; border: 1px solid var(--border2); margin-bottom: 20px; }
    .place-preview-img { width: 100%; height: 150px; object-fit: cover; display: block; }
    .place-preview-body { padding: 14px; background: var(--bg3); }
    .place-preview-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; margin-bottom: 4px; }
    .place-preview-meta { font-size: 12px; color: var(--text3); }
    .autocomplete-wrap { position: relative; }
    .autocomplete-list {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 150;
      background: var(--bg2); border: 1px solid var(--border2);
      border-top: none; border-radius: 0 0 12px 12px;
      max-height: 280px; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .ac-item {
      padding: 13px 16px; cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:active { background: var(--bg3); }
    .ac-main { font-size: 14px; color: var(--text); }
    .ac-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .spot-card { display: flex; gap: 13px; padding: 14px; }
    .spot-thumb {
      width: 68px; height: 68px; border-radius: 10px;
      object-fit: cover; flex-shrink: 0; background: var(--bg3);
    }
    .spot-thumb-ph {
      width: 68px; height: 68px; border-radius: 10px;
      background: var(--bg3); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 26px;
    }
    .spot-name { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; line-height: 1.2; margin-bottom: 4px; }
    .spot-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .spot-notes { font-size: 12px; color: var(--text2); font-style: italic; margin-top: 6px; line-height: 1.4; }
    .action-row { display: flex; gap: 8px; padding: 0 14px 12px; justify-content: flex-end; }
    .action-edit { padding: 7px 14px; border-radius: 8px; background: var(--bg3); color: var(--text2); font-size: 12px; }
    .action-del { padding: 7px 14px; border-radius: 8px; background: rgba(201,71,42,0.12); color: var(--accent); font-size: 12px; }
    .find-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
    .find-card-img { width: 100%; height: 150px; object-fit: cover; display: block; background: var(--bg3); }
    .find-card-body { padding: 14px; }
    .find-card-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; margin-bottom: 6px; }
    .find-card-meta { font-size: 12px; color: var(--text3); }
    .ai-pill {
      display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px;
      border-radius: 20px; background: var(--accent-dim); border: 1px solid rgba(201,71,42,0.3);
      font-size: 11px; color: var(--accent2); text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    .ai-reason { font-size: 13px; color: var(--text2); line-height: 1.5; margin-top: 8px; font-style: italic; }
    .spinner { width: 22px; height: 22px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 64px 30px; }
    .empty-icon { font-size: 52px; margin-bottom: 16px; }
    .empty-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 300; color: var(--text2); margin-bottom: 8px; }
    .empty-text { font-size: 13px; color: var(--text3); line-height: 1.7; }
    .setup-warn { background: rgba(201,71,42,0.1); border: 1px solid rgba(201,71,42,0.25); border-radius: 10px; padding: 13px 15px; margin: 14px 20px; font-size: 13px; color: var(--accent2); line-height: 1.6; }
    .star { color: #f5a623; }
    .login-bg {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px; background: var(--bg);
    }
    .login-logo { font-family: 'Cormorant Garamond', serif; font-size: 48px; font-weight: 300; text-align: center; margin-bottom: 8px; }
    .login-tagline { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.18em; text-align: center; margin-bottom: 48px; }
    .login-form-wrap { width: 100%; max-width: 380px; }
    .login-err { background: rgba(201,71,42,0.12); border: 1px solid rgba(201,71,42,0.3); border-radius: 10px; padding: 12px 14px; font-size: 13px; color: var(--accent2); margin-bottom: 16px; }
    .login-toggle { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text3); }
    .login-toggle button { color: var(--accent2); font-size: 13px; padding: 4px; }
    .date-opt {
      padding: 16px; border-radius: 12px; border: 1px solid var(--border2);
      margin-bottom: 10px; cursor: pointer; transition: all 0.15s;
    }
    .date-opt:active { border-color: var(--accent); background: var(--accent-dim2); }
    .date-opt-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; margin-bottom: 4px; }
    /* DATE WIZARD */
    .dw-type-card {
      width: 100%; padding: 18px 16px; border-radius: 14px; border: 1.5px solid var(--border2);
      margin-bottom: 10px; cursor: pointer; transition: all 0.18s; text-align: left;
      display: flex; align-items: center; gap: 14px;
    }
    .dw-type-card:active { transform: scale(0.98); }
    .dw-type-card.sel { border-color: var(--love); background: rgba(224,96,122,0.08); }
    .dw-type-emoji { font-size: 28px; line-height: 1; flex-shrink: 0; }
    .dw-type-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; }
    .dw-type-tag { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .dw-section { margin-bottom: 20px; }
    .dw-section-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 10px; }
    .dw-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .dw-chip {
      padding: 8px 15px; border-radius: 20px; font-size: 13px; border: 1.5px solid var(--border2);
      color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .dw-chip.on { border-color: var(--love); background: rgba(224,96,122,0.12); color: var(--love); }
    .dw-chip:active { opacity: 0.75; }
    .dw-go-btn {
      width: 100%; padding: 17px; border-radius: 13px; margin-top: 8px;
      background: linear-gradient(135deg, #c0405a 0%, #c9472a 100%);
      color: #fff; font-size: 16px; font-weight: 500; letter-spacing: 0.02em;
      transition: opacity 0.2s, transform 0.1s;
    }
    .dw-go-btn:active { opacity: 0.88; transform: scale(0.98); }
    .dw-back { font-size: 13px; color: var(--text3); padding: 6px 0; margin-bottom: 14px; display: flex; align-items: center; gap: 5px; }
    .dw-headline { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 400; margin-bottom: 2px; }
    .dw-tagline { font-size: 13px; color: var(--love); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; font-weight: 500; }
    .dw-insight-box { background: rgba(224,96,122,0.07); border: 1px solid rgba(224,96,122,0.18); border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; }
    .dw-insight-text { font-size: 14px; color: var(--text2); line-height: 1.65; margin-bottom: 10px; }
    .dw-tips { display: flex; flex-direction: column; gap: 6px; }
    .dw-tip { display: flex; gap: 8px; font-size: 13px; color: var(--text3); line-height: 1.5; }
    .dw-tip-dot { color: var(--love); flex-shrink: 0; font-size: 16px; line-height: 1.3; }
    .dw-prefs-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 14px; }
    .date-opt-desc { font-size: 13px; color: var(--text3); line-height: 1.5; }
    .city-header { padding: 8px 20px 4px; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; }
    .filter-row { display: flex; gap: 8px; overflow-x: auto; padding: 10px 20px; -ms-overflow-style: none; scrollbar-width: none; }
    .filter-row::-webkit-scrollbar { display: none; }
    .search-wrap { padding: 12px 20px; }
    .search-inp { background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px; padding: 11px 14px; font-size: 15px; color: var(--text); width: 100%; outline: none; -webkit-appearance: none; }
    .search-inp:focus { border-color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .greet { font-size: 13px; color: var(--text3); }
    .signout-btn { font-size: 12px; color: var(--text3); padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border); }
    .count-badge { background: var(--accent); color: #fff; font-size: 10px; border-radius: 10px; padding: 1px 6px; margin-left: 4px; vertical-align: middle; }
    .find-controls { padding: 14px 20px 6px; display: flex; flex-direction: column; gap: 12px; }
    .find-query-wrap { position: relative; }
    .find-query { padding-right: 100px !important; }
    .date-btn-inline {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: var(--bg4); border: 1px solid var(--border2); border-radius: 8px;
      padding: 7px 12px; font-size: 13px; color: var(--text2); white-space: nowrap;
      transition: all 0.15s;
    }
    .date-btn-inline:active { border-color: var(--accent); color: var(--accent2); }
    .find-go-btn {
      background: var(--accent); color: #fff; border-radius: 10px;
      padding: 13px; font-size: 15px; font-weight: 500; width: 100%;
      transition: background 0.2s;
    }
    .find-go-btn:active { background: var(--accent2); }
    .price-sym { letter-spacing: 0; }
    .place-google-rating { color: #f5a623; font-size: 12px; }
    .home-wrap { min-height: 100vh; display: flex; flex-direction: column; }
    .home-header { padding-top: calc(54px + var(--safe-t)); padding-left: 24px; padding-right: 24px; padding-bottom: 10px; }
    .home-logo { font-family: 'Cormorant Garamond', serif; font-size: 54px; font-weight: 300; line-height: 1; letter-spacing: -0.01em; }
    .home-sub { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.16em; margin-top: 6px; }
    .home-cards { flex: 1; padding: 12px 16px calc(48px + var(--safe-b)); display: flex; flex-direction: column; gap: 12px; }
    .home-card { flex: 1; border-radius: 22px; display: flex; flex-direction: column; border: none; text-align: center; position: relative; overflow: hidden; transition: transform 0.15s; cursor: pointer; }
    .home-card:active { transform: scale(0.975); }
    .home-card-inner { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 28px 20px; gap: 10px; }
    .home-card-emoji { font-size: 48px; line-height: 1; }
    .home-card-name { font-family: 'Cormorant Garamond', serif; font-size: 52px; font-weight: 400; line-height: 1; letter-spacing: -0.02em; }
    .home-card-desc { font-size: 13px; line-height: 1.5; color: var(--text3); }
    .card-spots { background: linear-gradient(140deg, #1e1a16 0%, #27231f 100%); border: 1px solid #3a342e; }
    .card-rate  { background: linear-gradient(140deg, #181e15 0%, #202820 100%); border: 1px solid #2e3828; }
    .card-find  { background: linear-gradient(140deg, #2a1510 0%, #1e1008 100%); border: 1px solid rgba(201,71,42,0.45); box-shadow: 0 0 50px rgba(201,71,42,0.07); }
    .date-big-btn { width: 100%; padding: 16px 20px; background: linear-gradient(135deg, rgba(224,96,122,0.16) 0%, rgba(201,71,42,0.14) 100%); border: 1.5px solid rgba(224,96,122,0.38); border-radius: 14px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 0.2s; }
    .date-big-btn:active { opacity: 0.85; transform: scale(0.98); }
    .date-big-btn.on { border-color: var(--love); background: linear-gradient(135deg, rgba(224,96,122,0.24) 0%, rgba(201,71,42,0.18) 100%); }
    .date-big-emoji { font-size: 28px; line-height: 1; }
    .date-big-text { flex: 1; text-align: left; }

function App() {
  var _token = useState(null); var token = _token[0]; var setToken = _token[1];
  var _user = useState(null); var user = _user[0]; var setUser = _user[1];

  useEffect(function() {
    try {
      var saved = localStorage.getItem("findaspot_session");
      if (saved) {
        var sess = JSON.parse(saved);
        if (sess && sess.token && sess.user && sess.expires && Date.now() < sess.expires) {
          setToken(sess.token);
          setUser(sess.user);
        } else {
          localStorage.removeItem("findaspot_session");
        }
      }
    } catch(e) {}
  }, []);

  function handleLogin(t, u, remember) {
    setToken(t); setUser(u);
    if (remember) {
      try {
        localStorage.setItem("findaspot_session", JSON.stringify({
          token: t, user: u,
          expires: Date.now() + 30 * 24 * 60 * 60 * 1000
        }));
      } catch(e) {}
    }
  }
  function handleLogout() {
    setToken(null); setUser(null);
    try { localStorage.removeItem("findaspot_session"); } catch(e) {}
  }

  if (!token) {
    return E(LoginScreen, { onLogin: handleLogin });
  }
  return E(MainApp, { token: token, user: user, onLogout: handleLogout });
}

ReactDOM.render(E(App), document.getElementById("root"));
